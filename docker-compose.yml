services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  # Redpanda - Kafka compatible streaming platform
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.8
    container_name: bugbot-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:1448
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=info
    ports:
      - "1448:19092" # Kafka API (external) - Port 1448
      - "18081:18081" # Schema Registry (internal only)
      - "18082:18082" # HTTP Proxy (internal only)
      - "9644:9644" # Admin API (internal only)
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: [ "CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - iot_network
    restart: unless-stopped

  # Redpanda Console - Web UI for Kafka
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: bugbot-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "1440:8080" # Redpanda Console - Port 1440
    networks:
      - iot_network
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # MinIO - S3 compatible object storage
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: bugbot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DOMAIN: minio
    ports:
      - "1442:9000" # S3 API - Port 1442
      - "1441:9001" # Console UI - Port 1441
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iot_network
    restart: unless-stopped

  # MinIO Client - Create buckets on startup (one-time only)
  minio-client:
    image: minio/mc:RELEASE.2024-01-18T07-03-39Z
    container_name: bugbot-minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " mc alias set myminio http://minio:9000 minioadmin minioadmin123; mc mb myminio/iot-images --ignore-existing; mc mb myminio/iot-raw --ignore-existing; mc anonymous set download myminio/iot-images 2>/dev/null || true; echo 'MinIO buckets created successfully'; exit 0; "
    networks:
      - iot_network
    restart: "no" # One-time setup, don't restart

  # ClickHouse - OLAP database for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:23.12-alpine
    container_name: bugbot-clickhouse
    environment:
      CLICKHOUSE_DB: iot
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: clickhouse123
    ports:
      - "1443:8123" # HTTP interface - Port 1443
      - "1444:9000" # Native client - Port 1444
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--password=clickhouse123", "--query", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - iot_network
    restart: unless-stopped

  # MongoDB - OLTP database
  mongodb:
    image: mongo:7.0
    container_name: bugbot-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongodb123
      MONGO_INITDB_DATABASE: iot
    ports:
      - "1445:27017" # MongoDB - Port 1445
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongodb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot_network
    restart: unless-stopped

  # ============================================
  # APPLICATION SERVICES
  # ============================================

  # Backend API Service (Node.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bugbot-backend
    ports:
      - "1435:1435"
    environment:
      - NODE_ENV=production
      - PORT=1435
      - LOG_LEVEL=info
      - KAFKA_BROKERS=redpanda:9092
      - KAFKA_CLIENT_ID=iot-backend
      - KAFKA_TOPIC_RAW=events.raw
      - KAFKA_TOPIC_ENRICHED=events.enriched
      - STREAM_PROCESSOR_ENABLED=true
      - KAFKA_CONSUMER_GROUP=iot-backend-processor
      - ENRICHED_EVENTS_PROCESSOR_ENABLED=true
      - KAFKA_ENRICHED_CONSUMER_GROUP=iot-backend-enriched-processor
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=iot-raw
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse123
      - CLICKHOUSE_DATABASE=iot
      - MONGO_URI=mongodb://root:mongodb123@mongodb:27017
      - MONGO_DATABASE=iot
      - MQTT_ENABLED=false
    volumes:
      - ./uploads:/app/uploads
      - ./.env:/app/.env:ro
    networks:
      - iot_network
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:1435/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # AI Inference Service (Python)
  ai-inference:
    build:
      context: ./services/ai-inference
      dockerfile: Dockerfile
    container_name: bugbot-ai-inference
    ports:
      - "1446:8000" # AI Inference Service - Port 1446
    environment:
      - SERVICE_PORT=8000
      - LOG_LEVEL=INFO
      - KAFKA_BROKERS=redpanda:9092
      - KAFKA_TOPIC_RAW=events.raw
      - KAFKA_TOPIC_ENRICHED=events.enriched
      - KAFKA_CONSUMER_GROUP=ai-inference-service
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_USE_SSL=false
      - MINIO_BUCKET_RAW=iot-raw
      - MINIO_BUCKET_ANNOTATED=iot-annotated
      - YOLO_MODEL_PATH=models/yolov8n.pt
      - YOLO_CONFIDENCE_THRESHOLD=0.25
      - YOLO_DEVICE=cpu
    volumes:
      - ./services/ai-inference/models:/app/models
    networks:
      - iot_network
    depends_on:
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health/liveness', timeout=5)" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Label Studio - Annotation tool
  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: bugbot-label-studio
    ports:
      - "1447:8080" # Label Studio - Port 1447
    environment:
      - LABEL_STUDIO_HOST=0.0.0.0
      - LABEL_STUDIO_PORT=8080
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data # ==== S3/MinIO backend resolve (QUAN TRỌNG) ====
      - AWS_S3_ENDPOINT=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
      - AWS_S3_ADDRESSING_STYLE=path
      - AWS_S3_SIGNATURE_VERSION=s3v4
      # Force path-style addressing for MinIO (S3-compatible)
      - AWS_S3_FORCE_PATH_STYLE=true
      - S3_FORCE_PATH_STYLE=true
    volumes:
      - labelstudio_data:/label-studio/data
    networks:
      - iot_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  iot_network:
    driver: bridge

volumes:
  redpanda_data:
  minio_data:
  clickhouse_data:
  mongodb_data:
  labelstudio_data:


