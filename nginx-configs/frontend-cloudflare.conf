# Frontend Dashboard - Nginx Configuration (Cloudflare Tunnel)
# Domain: yourdomain.com
# Internal Port: 1435 (Backend API proxy)
# NOTE: Cloudflare Tunnel handles SSL, so we only need HTTP

# HTTP Frontend Dashboard (Cloudflare Tunnel handles SSL)
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Frontend files
    root /var/www/bugbot/frontend/build;
    index index.html;

    # API proxy (Backend API)
    location /api/ {
        proxy_pass http://127.0.0.1:1435;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cloudflare headers
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_set_header CF-Ray $http_cf_ray;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # API SSE proxy (Server-Sent Events)
    location = /api/iot/mqtt/events/stream {
        proxy_pass http://127.0.0.1:1435/api/iot/mqtt/events/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for real-time events
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_set_header Connection '';
        
        # Keep connection open longer (1 hour)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Security headers (Cloudflare will add SSL headers)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

