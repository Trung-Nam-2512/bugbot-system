# Label Studio - Nginx Configuration
# Domain: label.yourdomain.com
# Internal Port: 1447

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name label.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS Label Studio
server {
    listen 443 ssl http2;
    server_name label.yourdomain.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/label.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/label.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:1447;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

